@if (loading()){
    <app-skeleton/>
} @else {
    @if(products().length != 0){
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="m-0">{{title}}</h2>
            <h6 class="m-0">View All</h6>
        </div>

        <div class="products-wrapper d-flex align-items-center gap-3 mb-5">
            <button pButton icon="pi pi-angle-left" class="scroll-btn left p-xl-1 px-3" (click)="scrollLeft()"></button>
            <div class="products-row" #scrollContainer>
                @for(product of products(); track product.id){
                    <div class="product-card p-2">
                        <div class="p-4 border rounded d-flex flex-column">
                            <img class="rounded w-100" [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + product.baseImage" [alt]="product.name" style="max-width: 300px; min-width:100px" />
                            <div class="pt-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <div class="h5 fw-medium">{{ product.name }}</div>
                                        <span class="fw-medium h6 mt-1">{{ product.brand }}</span>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-1">
                                    <span class="h5 p-0 m-0 fw-semibold">{{ product.price | currency: 'USD' }}</span>
                                    <button pButton [disabled]="product.availablestock === 0" class="text-nowrap w-auto">
                                        <i class="pi pi-shopping-cart"></i>
                                        <span class="btn-label fw-semibold">Add to Cart</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                }
            </div>
            <button pButton icon="pi pi-angle-right" class="scroll-btn right p-xl-1 px-3" (click)="scrollRight()"></button>
        </div>
    }
}
