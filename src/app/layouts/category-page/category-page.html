<h1 class="display-2 mb-sm-5 mb-0 text-center fw-semibold">{{CategoryTitle()}} Collection</h1>

@if(loading()===true){
    <app-skeleton/>
} @else {
    @if (subtabs().length > 1) {
        <app-tabs [tabs]="subtabs()"/>
    }

    @for (subtab of subtabs(); track subtab){
        <app-overview [tabTitle]="subtab.slug"/>
    }
}
